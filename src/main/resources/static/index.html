<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartLab - Rastreabilidade SPDA</title>
    <!-- Importação da fonte Inter para garantir que o CSS funcione perfeitamente -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <!-- Seção Esquerda: Apresentação Institucional do Sistema -->
        <section id="sectionEsquerda">
            <div class="logo-container">
                <span class="logo-icon">⚡</span>
                <span class="logo-texto">SmartLab</span>
            </div>
            <div class="conteudo-boas-vindas">
                <h1>Sistema de Rastreabilidade Digital</h1>
                <p>Gerenciamento, mapeamento via QR Code e inspeção técnica de pontos de SPDA em ambientes industriais.</p>
            </div>
            <div class="badge-disciplina">
                Análise e Processamento de Sinais
            </div>
        </section>

        <!-- Seção Direita: Botões de Ação de Autenticação -->
        <section id="sectionDireita">
            <div class="form-header">
                <h2>Bem-vindo</h2>
                <p>Escolha uma opção para acessar a plataforma</p>
            </div>
            
            <div class="botoes-container">
                <!-- Ajustado: Botão Login agora diz "Entrar" e vai para o Login -->
                <a href="login/login.html" class="link-botao">
                    <button id="botaoLogin">
                        <span>Entrar no Sistema</span>
                    </button>
                </a>
                
                <!-- Ajustado: Botão Cadastrar agora diz "Criar Conta" e vai para o Cadastro -->
                <a href="cadastro/cadastro.html" class="link-botao">
                    <button id="botaoCadastrar">
                        <span>Criar Conta</span>
                    </button>
                </a>
            </div>
        </section>
    </div>

</body>
</html>
