spring.application.name=qrcode
app.base-url=http://localhost:8080
spring.datasource.url=jdbc:mysql://localhost:3306/sistema_qrcode?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configurações adicionais recomendadas para o Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.security.user.name=${MAJOR_ADMIN_NAME}
spring.security.user.password=${MAJOR_ADMIN_SECRET}

aws.s3.region=${AWS_REGION}
aws.s3.bucket-name=${AWS_BUCKET_NAME}
api.security.token.secret=${DB_PASSWORD}

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
