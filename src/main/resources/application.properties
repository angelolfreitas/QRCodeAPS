spring.application.name=qrcode

spring.datasource.url=jdbc:mysql://localhost:3306/sistema_qrcode?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configurações adicionais recomendadas para o Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.security.user.name=2
spring.security.user.password=1

aws.s3.region=${AWS_REGION}
aws.s3.bucket-name=${AWS_BUCKET_NAME}
api.security.token.secret=${DB_PASSWORD}

